syntax = "proto3";

package safety;

service SafetyService {

  rpc CheckFatigue (SafetyRequest)
      returns (SafetyReply);

  rpc StreamAlerts (AlertRequest)
      returns (stream AlertReply);
}

message SafetyRequest {
  string workerName = 1;
  int32 hoursWorked = 2;
  bool unsafeCondition = 3;
}

message SafetyReply {
  string status = 1;
  bool alert = 2;
}

message AlertRequest {
  string site = 1;
}

message AlertReply {
  string message = 1;
}